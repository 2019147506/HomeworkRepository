<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
    <h1>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>

    <div class="nav">
        <a href="login.html">로그인</a>
        <span>|</span>
        <a href="signup.html">회원가입</a>
    </div>

    <div class="container small-box">
        <form action="#" method="post">
            <div class="form-row">
                <label for="login-id" class="field-label">아이디 :</label>
                <input type="text" id="login-id" name="login-id" placeholder="아이디 입력" required autocomplete="username">
            </div>

            <div class="form-row">
                <label for="login-pw" class="field-label">비밀번호 :</label>
                <input type="password" id="login-pw" name="login-pw" placeholder="비밀번호 입력" required autocomplete="current-password">
            </div>

            <div class="button-group">
                <button type="submit" class="btn signup-btn">Login</button>
                <button type="reset" class="btn cancel-btn">Cancel</button>
            </div>
        </form>
    </div>
</body>
</html>
