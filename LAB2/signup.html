<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
    <h1>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>

    <div class="nav">
        <a href="login.html">로그인</a>
        <span>|</span>
        <a href="signup.html">회원가입</a>
    </div>

    <div class="container">
        <form action="login.html" method="get">
            <div class="form-row">
                <label for="name" class="field-label">이름 :</label>
                <input type="text" id="name" name="name" autofocus placeholder="이름 입력" required autocomplete="name">
            </div>

            <div class="form-row">
                <label for="birth" class="field-label">생일 :</label>
                <input type="date" id="birth" name="birth" required>
            </div>

            <div class="form-row">
                <span class="field-label">성별 :</span>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="gender" value="male" required>
                        남성
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="gender" value="female">
                        여성
                    </label>
                </div>
            </div>

            <div class="form-row">
                <label for="grade" class="field-label">학년 :</label>
                <input type="number" id="grade" name="grade" min="1" max="4" step="1" placeholder="1~4 입력" required>
            </div>

            <div class="form-row">
                <label for="userid" class="field-label">아이디 :</label>
                <input type="text" id="userid" name="userid" placeholder="아이디 입력" required autocomplete="username">
            </div>

            <div class="form-row">
                <label for="password" class="field-label">비밀번호 :</label>
                <input type="password" id="password" name="password" placeholder="비밀번호 입력" required autocomplete="new-password">
            </div>

            <div class="form-row">
                <label for="email" class="field-label">이메일 :</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required autocomplete="email">
            </div>

            <div class="form-row">
                <label for="question" class="field-label">보안 질문 :</label>
                <select id="question" name="question" required>
                    <option value="">질문을 선택하세요</option>
                    <option value="movie">가장 좋아하는 영화는?</option>
                    <option value="pet">가장 좋아하는 반려동물 이름은?</option>
                    <option value="city">가장 기억에 남는 도시는?</option>
                </select>
            </div>

            <div class="form-row">
                <label for="answer" class="field-label">답변 :</label>
                <input type="text" id="answer" name="answer" placeholder="답변 입력" required>
            </div>

            <div class="button-group">
                <button type="submit" class="btn signup-btn">Signup</button>
                <button type="reset" class="btn cancel-btn">Cancel</button>
                <button type="button" class="btn login-move-btn" onclick="location.href='login.html'">Login</button>
            </div>
        </form>
    </div>
</body>
</html>
